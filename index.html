<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學拆彈專家</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: #2c2c2c; padding: 30px; border-radius: 20px; width: 90%; max-width: 550px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .screen { display: none; }
        .active { display: block; }
        h1 { color: #5dade2; margin-bottom: 20px; }
        .rule-list, .history-list { text-align: left; background: #383838; padding: 20px; border-radius: 12px; margin-bottom: 20px; line-height: 1.8; }
        .history-item { border-bottom: 1px solid #555; padding: 10px 0; font-size: 0.95rem; }
        #question-text { font-size: 1.6rem; margin: 25px 0; color: #f4d03f; min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; padding: 0 10px; transition: color 0.3s; }
        input { width: 100%; box-sizing: border-box; padding: 15px; font-size: 1.5rem; border-radius: 8px; border: none; margin-bottom: 20px; text-align: center; background: #fff; color: #000; }
        .btn-main { width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-start { background: #ecf0f1; color: #2c3e50; }
        .btn-submit { background: #27ae60; color: white; }
        .btn-skip { background: #e67e22; color: white; width: 40%; }
        .btn-main:disabled { background: #7f8c8d; cursor: not-allowed; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.4rem; }
        #hearts-display { color: #e74c3c; letter-spacing: 5px; }
        #timer { font-size: 2.5rem; font-weight: bold; color: #e74c3c; margin-bottom: 10px; }
        /* 反饋顏色 */
        .text-success { color: #2ecc71 !important; }
        .text-danger { color: #e74c3c !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen active">
        <h1>🎯 數學拆彈專家</h1>
        <div class="rule-list">
            🎯 總共有 5 個關卡，難度隨關卡提升。<br>
            ❤️ 生命值：<span id="hearts-preview" style="color:#e74c3c">❤️❤️❤️</span><br>
            ⏳ 答錯、超時或跳過都會扣 1 顆心。<br>
            每題只有 60 秒拆彈時間。<br>
            ⌨️ 提示：輸入答案後按 <b>Enter</b> 即可快速送出！
        </div>
        <button class="btn-main btn-start" onclick="startGame()">開始挑戰</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="stats">
            <span id="hearts-display">❤️❤️❤️</span>
            <span id="stage-display">關卡 1/5</span>
        </div>
        <div id="timer">60s</div>
        <div id="question-text">📡 任務接收中...</div>
        <input type="number" id="answer-input" placeholder="請輸入純數字" inputmode="numeric" onkeyup="handleKeyUp(event)">
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button id="skip-btn" class="btn-main btn-skip" onclick="skipQuestion()">跳過</button>
            <button id="submit-btn" class="btn-main btn-submit" style="width: 58%;" onclick="checkAnswer()">確認拆解</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="result-title">任務結束</h1>
        <p>📝 題目回顧（方便抄寫算式）：</p>
        <div id="history-container" class="history-list"></div>
        <button class="btn-main btn-start" onclick="location.reload()">再挑戰一次</button>
    </div>
</div>

<script>
    let currentStage = 1;
    let hearts = 3;
    let timeLeft = 60;
    let correctAnswer = "";
    let timerInterval;
    let questionHistory = [];
    let isTransitioning = false; // 防止重複點擊
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx68y3gdKWogn3-LOJDQjKek9AKutVdlO7_d3hadxDIrJw0hsIWRlrvrdYNtcJA_l94yQ/exec";

    function startGame() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        loadQuestion();
    }

    async function loadQuestion() {
        if (isTransitioning) return;
        
        const qText = document.getElementById('question-text');
        qText.classList.remove('text-success', 'text-danger');
        qText.innerText = "📡 連線中...";
        
        const inputField = document.getElementById('answer-input');
        inputField.value = "";
        inputField.disabled = false;
        inputField.focus();
        
        toggleButtons(false); // 啟用按鈕

        try {
            const resp = await fetch(`${GAS_URL}?stage=${currentStage}`);
            const data = await resp.json();
            qText.innerText = data.display; 
            correctAnswer = data.answer.toString();
            questionHistory.push({ q: data.display, a: data.answer });
            startCountdown();
        } catch (e) {
            qText.innerText = "⚠️ 通訊異常，請重新整理。";
        }
    }

    function handleKeyUp(e) {
        if (e.key === "Enter" && !isTransitioning) checkAnswer();
    }

    function startCountdown() {
        clearInterval(timerInterval);
        timeLeft = 60;
        updateUI();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateUI();
            if (timeLeft <= 0) { 
                clearInterval(timerInterval); 
                handleResponse(false, "⏰ 超時爆炸！"); 
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('timer').innerText = timeLeft + "s";
        let heartStr = "";
        for(let i=1; i<=3; i++) {
            heartStr += (i <= hearts) ? "❤️" : "🖤";
        }
        document.getElementById('hearts-display').innerText = heartStr;
        document.getElementById('stage-display').innerText = `關卡 ${currentStage}/5`;
    }

    function toggleButtons(disabled) {
        isTransitioning = disabled;
        document.getElementById('submit-btn').disabled = disabled;
        document.getElementById('skip-btn').disabled = disabled;
        document.getElementById('answer-input').disabled = disabled;
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value;
        if (input === "" || isTransitioning) return;

        if (input === correctAnswer) {
            handleResponse(true, "✅ 拆解成功！");
        } else {
            handleResponse(false, "❌ 密碼錯誤！");
        }
    }

    function skipQuestion() {
        handleResponse(false, "⏭️ 跳過此題");
    }

    function handleResponse(isCorrect, msg) {
        clearInterval(timerInterval);
        toggleButtons(true);
        
        const qText = document.getElementById('question-text');
        
        if (isCorrect) {
            qText.classList.add('text-success');
            qText.innerText = msg;
            
            setTimeout(() => {
                if (currentStage < 5) {
                    currentStage++;
                    loadQuestion();
                } else {
                    showResult(true);
                }
            }, 1200);
        } else {
            hearts--;
            qText.classList.add('text-danger');
            qText.innerText = msg;
            updateUI();
            
            setTimeout(() => {
                if (hearts <= 0) {
                    showResult(false);
                } else {
                    // 如果沒心了就不會載入新題，直接走上面的 showResult
                    currentStage++; // 既然扣心了，也要前進到下一題（或是留在原題，依您需求，此處設定為前進）
                    if (currentStage <= 5) {
                        loadQuestion();
                    } else {
                        showResult(hearts > 0);
                    }
                }
            }, 1200);
        }
    }

    function showResult(isWin) {
        clearInterval(timerInterval);
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('result-title').innerText = isWin ? "🏆 成功解救城市！" : "💥 任務失敗";
        
        const container = document.getElementById('history-container');
        container.innerHTML = questionHistory.map((item, index) => 
            `<div class="history-item"><b>第${index+1}題：</b>${item.q} <span style="color:#2ecc71; font-weight:bold;">${item.a}</span></div>`
        ).join('');
    }
</script>

</body>
</html>
