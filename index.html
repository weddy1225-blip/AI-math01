<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; display: flex; justify-content: center; padding: 20px; }
    #game-container { width: 100%; max-width: 500px; background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
    .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }
    #timer { color: #ff4757; font-size: 1.2em; }
    #hearts { color: #ff6b81; font-size: 1.2em; }
    #message-area { height: 50px; margin: 15px 0; font-weight: bold; color: #eccc68; transition: all 0.3s; }
    .hidden { display: none; }
    input[type="text"] { width: 80%; padding: 12px; font-size: 18px; border-radius: 8px; border: none; margin-bottom: 15px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; transition: 0.2s; margin: 5px; }
    .btn-start { background: #2ed573; color: white; }
    .btn-submit { background: #1e90ff; color: white; }
    .btn-skip { background: #ffa502; color: white; }
    .btn-restart { background: #747d8c; color: white; }
    #history-area { margin-top: 20px; text-align: left; background: #3d3d3d; padding: 15px; border-radius: 8px; font-size: 0.9em; }
    .correct-msg { color: #2ed573; }
    .wrong-msg { color: #ff4757; }
  </style>
</head>
<body>

<div id="game-container">
  <div id="start-screen">
    <h1>🎯 數學拆彈專家</h1>
    <div style="text-align: left; line-height: 1.6; margin-bottom: 20px;">
      <p>🎯 總共有 5 個關卡，難度會隨關卡提升。</p>
      <p>❤️ 你有 3 顆心，答錯、超時或跳過都會扣除 1 顆心。</p>
      <p>⏳ 每題只有 60 秒拆彈時間。</p>
      <p>🏁 完成 5 關即獲得勝利，愛心歸零則遊戲結束。</p>
    </div>
    <button class="btn-start" onclick="startGame()">開始挑戰</button>
  </div>

  <div id="game-screen" class="hidden">
    <div class="status-bar">
      <span id="hearts">❤️❤️❤️</span>
      <span id="stage-display">第 1 題</span>
      <span id="timer">⏳ 60s</span>
    </div>
    
    <div id="message-area">準備中...</div>
    
    <div id="question-display" style="font-size: 22px; margin: 20px 0;">正在呼叫防爆中心...</div>
    
    <input type="text" id="answer-input" placeholder="輸入數字答案..." autocomplete="off">
    <br>
    <button class="btn-submit" onclick="checkAnswer()">確認拆解</button>
    <button class="btn-skip" onclick="skipStage()">跳過 (扣心)</button>
  </div>

  <div id="end-screen" class="hidden">
    <h2 id="end-title">遊戲結束</h2>
    <div id="history-area">
      <h3>📝 任務題目回顧：</h3>
      <div id="history-list"></div>
    </div>
    <button class="btn-restart" onclick="location.reload()">再挑戰一次</button>
  </div>
</div>

<script>
  let gameState = {
    currentStage: 1,
    hearts: 3,
    timeLeft: 60,
    history: [],
    correctAnswer: "",
    timerInterval: null
  };

  function startGame() {
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    loadQuestion();
  }

  function loadQuestion() {
    if (gameState.currentStage > 5) return endGame(true);
    
    document.getElementById('stage-display').innerText = `第 ${gameState.currentStage} 題`;
    document.getElementById('question-display').innerText = "正在傳輸線路數據...";
    document.getElementById('answer-input').value = "";
    document.getElementById('message-area').innerText = "";
    
    google.script.run.withSuccessHandler(function(response) {
      let data = JSON.parse(response);
      document.getElementById('question-display').innerText = data.display;
      gameState.correctAnswer = data.answer;
      gameState.history.push({ q: data.display, a: data.answer });
      resetTimer();
    }).getMathQuestion(gameState.currentStage);
  }

  function resetTimer() {
    clearInterval(gameState.timerInterval);
    gameState.timeLeft = 60;
    updateTimerDisplay();
    gameState.timerInterval = setInterval(() => {
      gameState.timeLeft--;
      updateTimerDisplay();
      if (gameState.timeLeft <= 0) {
        handleWrong("⚠️ 超時爆炸！失去 1 顆心");
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    document.getElementById('timer').innerText = `⏳ ${gameState.timeLeft}s`;
  }

  function checkAnswer() {
    let userInput = document.getElementById('answer-input').value.trim();
    if (userInput === gameState.correctAnswer) {
      handleCorrect();
    } else {
      handleWrong("⚠️ 密碼錯誤！失去 1 顆心");
    }
  }

  function handleCorrect() {
    clearInterval(gameState.timerInterval);
    document.getElementById('message-area').innerHTML = `<span class="correct-msg">✅ 第 ${gameState.currentStage} 道鎖已解除！</span>`;
    gameState.currentStage++;
    setTimeout(() => {
      if (gameState.currentStage <= 5) loadQuestion();
      else endGame(true);
    }, 1500);
  }

  function handleWrong(msg) {
    clearInterval(gameState.timerInterval);
    gameState.hearts--;
    updateHearts();
    document.getElementById('message-area').innerHTML = `<span class="wrong-msg">${msg}</span>`;
    
    setTimeout(() => {
      if (gameState.hearts <= 0) {
        endGame(false);
      } else {
        gameState.currentStage++;
        loadQuestion();
      }
    }, 1500);
  }

  function skipStage() {
    handleWrong("⚠️ 已跳過線路！失去 1 顆心");
  }

  function updateHearts() {
    document.getElementById('hearts').innerText = "❤️".repeat(gameState.hearts) + "🖤".repeat(3 - gameState.hearts);
  }

  function endGame(isWin) {
    clearInterval(gameState.timerInterval);
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('end-screen').classList.remove('hidden');
    document.getElementById('end-title').innerText = isWin ? "🎉 任務成功！你是數學專家" : "💀 任務失敗！炸彈已引爆";
    
    let historyList = document.getElementById('history-list');
    gameState.history.forEach((item, index) => {
      historyList.innerHTML += `<p>${item.q} (正確答案：${item.a})</p>`;
    });
  }
</script>
</body>
</html>
